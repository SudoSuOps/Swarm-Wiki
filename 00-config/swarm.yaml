    rj_per_hour: 683
  granthash:
    price_per_lb: 0.0061
    rj_per_hour: 246
  medhash:
    price_per_lb: 0.0072
    rj_per_hour: 209
  avihash:
    price_per_lb: 0.0075
    rj_per_hour: 200
  agenthash:
