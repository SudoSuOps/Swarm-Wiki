# ─── WEIGHT CLASSES ─────────────────────────────────────────────
# Source of truth for classification thresholds.
# Raised from 0.75 → 0.85 on 2026-04-06.
weight_classes:
  royal_jelly:
    threshold: 0.85
    label: "Class A"
    description: "Premium, dense, heavy. You earn Class A."
  honey:
    threshold: 0.70
    label: "Class B"
    description: "Solid, value-add. Usable."
  propolis:
    threshold: 0.0
    label: "Class C"
    description: "Composted, feeds the genome. Nothing wasted."

# ─── SCALES (TRIBUNAL) ─────────────────────────────────────────
# The tribunal is a SCALE. Two independent scales weigh each pair.
# Standing rule: scales MUST be 12B+. Different manufacturers.
scales:
  valid_models:
    - gemma3:12b
    - gemma4:31b
    - qwen2.5:32b
    - qwen3.5:27b
    - nemotron:70b
    - masterwriter:31b
  minimum_params: 12  # billion — anything below this is REJECTED

  # Standard domains (pairs generated by smaller models)
  standard:
    scale_a:
      model: gemma3:12b
      family: google
      endpoint: http://localhost:11434
    scale_b:
      model: qwen2.5:32b
      family: alibaba
      endpoint: http://localhost:11434

  # Heavy domains (pairs generated by 27B+ models)
  heavy:
    scale_a:
      model: gemma4:31b
      family: google
      endpoint: http://localhost:11434
    scale_b:
      model: qwen3.5:27b
      family: alibaba
      endpoint: http://localhost:11434

# ─── DOMAIN SCALE ASSIGNMENTS ──────────────────────────────────
# Which scale config each domain uses.
domain_scales:
  grants: standard
  legal: standard
  medical: standard
  cre: standard
  aviation: standard
  self_healing: standard
  clawhash: heavy
  agenthash: heavy

# ─── DOMAIN-HASH PRICING ───────────────────────────────────────
# Price per pound = 20x cost to mint (500W fleet, $0.15/kWh).
domain_hash:
  legalhash:
