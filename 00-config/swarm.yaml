# ─── STANDING RULES ────────────────────────────────────────────
# These are NOT config. These are law.
standing_rules:
  - "Never claim done without verification"
  - "Never touch corpus without audit"
  - "Cook clean — shut everything else down during a cook"
  - "Efficiency is king — right-size the silicon"
  - "Permit before build — no epoch without reviewed flight sheet"
  - "Never cook dispute_letters"
  - "Scales MUST be 12B+ — a 7B model cannot weigh 27B output"
  - "Different manufacturers for dual-scale — Google + Alibaba"
  - "Red team and blue team MUST be different model families"
