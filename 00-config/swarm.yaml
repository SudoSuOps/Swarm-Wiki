# ─── TRIBUNAL PARAMETERS ───────────────────────────────────────
tribunal:
  drift_threshold: 0.15       # max drift between 2-pass validation
  passes: 2                    # validate the validator
  temperature: 0.1             # deterministic weighing
  max_tokens: 512              # response length cap
  batch_size: 10               # pairs per weighing cycle
  cooldown_seconds: 5          # between batches

# ─── RED/BLUE TEAM ─────────────────────────────────────────────
# Adversarial pair generation architecture.
# Standing rule: red and blue MUST be different model families.
red_blue:
  red_team:
    model: gemma4:31b
    family: google
    temperature: 0.9
    role: "Attack generation — thinks like an adversary"
  blue_team:
    model: qwen3.5:27b
    family: alibaba
    temperature: 0.7
    role: "Defense generation — holds the line"

# ─── DEED WRITER ───────────────────────────────────────────────
# Standing rule: deed writers MUST be 12B+.
deed_writer:
  valid_models:
    - gemma3:12b
    - gemma4:31b
    - nemotron:70b
    - qwen2.5:32b
    - qwen3.5:27b
  default_model: gemma3:12b
  temperature: 0.1
  max_tokens: 400

